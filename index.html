<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipil Tourism</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to bottom,#fff0f5,#ffe4ec);
}

/* NAV */
nav{
position:fixed;
width:100%;
background:#ffb6c1;
z-index:1000;
}

.menu{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav ul li{
cursor:pointer;
padding:6px 12px;
border-radius:20px;
}

.menu-btn{
display:none;
font-size:25px;
}

/* MOBILE */
@media(max-width:768px){
nav ul{
display:none;
flex-direction:column;
position:absolute;
top:60px;
left:0;
width:100%;
background:#ff69b4;
text-align:center;
}
nav ul.show{display:flex;}
.menu-btn{display:block;}
}

/* HERO */
.hero{
height:100vh;
background:url('island.jpg') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:40px;
}

/* SECTION */
section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
margin-top:20px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#ff69b4;
color:white;
margin-top:40px;
}
</style>
</head>

<body>

<nav>
<div class="menu">
<h2>Ipil 💗</h2>
<span class="menu-btn" onclick="toggleMenu()">☰</span>
<ul id="navLinks">
<li onclick="go('home')">Home</li>
<li onclick="go('gallery')">Gallery</li>
</ul>
</div>
</nav>

<section class="hero" id="home">
<h1>Welcome to Ipil 💗</h1>
</section>

<section id="gallery">
<div class="card">
<h2>Gallery</h2>

<div class="gallery">

<img src="island.jpg" alt="Island">

<img src="stanchill.jpg" alt="Stanchill Farms">

<img src="waterfall.jpg" alt="Waterfall">

<img src="ipil.jpg" alt="Ipil Town">

<img src="sibugay.jpg" alt="Sibugay Banner">

</div>

</div>
</section>

<footer>
<p>© 2026 Ipil Tourism 💗</p>
</footer>

<script>
function go(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
document.getElementById("navLinks").classList.remove("show");
}

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
